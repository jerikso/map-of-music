services:
  db:
    image: postgres:16
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - map-of-music_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  crawler:
    build: ./Crawler
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  similaritymap:
    build: ./SimilarityMap
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
  
  api:
    build: ./Api
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
        
volumes:
  map-of-music_pgdata:
    external: true